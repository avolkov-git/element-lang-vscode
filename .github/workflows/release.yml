name: Release Extension

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install publishing tools
        run: npm install --global @vscode/vsce ovsx

      - name: Verify tag matches package version
        id: version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Tag version $TAG_VERSION does not match package.json version $PACKAGE_VERSION"
            exit 1
          fi
          echo "vsix_name=1c-element-${PACKAGE_VERSION}.vsix" >> "$GITHUB_OUTPUT"

      - name: Package extension
        run: vsce package --out "${{ steps.version.outputs.vsix_name }}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.version.outputs.vsix_name }}
          generate_release_notes: true

      - name: Publish to Visual Studio Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          if [ -z "$VSCE_PAT" ]; then
            echo "Missing VSCE_PAT secret"
            exit 1
          fi
          vsce publish -p "$VSCE_PAT"

      - name: Publish to Open VSX
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: |
          if [ -z "$OVSX_PAT" ]; then
            echo "Missing OVSX_PAT secret"
            exit 1
          fi
          ovsx publish "${{ steps.version.outputs.vsix_name }}" -p "$OVSX_PAT"
